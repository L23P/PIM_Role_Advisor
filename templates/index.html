<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIM Role Advisor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.min.css">
</head>
<body>
    <h1>PIM Role Advisor (AI)</h1>
    <form method="post" action="/ask">
        <textarea name="question" rows="4" placeholder="Ask your question..." required></textarea>
        <button type="submit">Submit</button>
    </form>
    {% if response %}
        <h2>AI Recommendation:</h2>
        <pre>{{ response }}</pre>
    {% endif %}
</body>
</html>
